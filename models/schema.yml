version: 2

models:
  - name: stg_ecommerce
    description: "Cleaned ecommerce staging table"
    columns:

      - name: order_id
        description: "Unique order identifier"
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - not_null

      - name: price
        tests:
          - not_null

      - name: status
        tests:
          - not_null

